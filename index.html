<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Cobros</title>
  <link rel="preconnect" href="https://api.github.com" crossorigin>
  <link rel="dns-prefetch" href="https://api.github.com">
  <style>
    [data-theme="dark"] {
      --bg:#101012; --surface:#1c1c1f; --surface2:#252528; --surface3:#2e2e32;
      --border:rgba(255,255,255,.08); --border-strong:rgba(255,255,255,.12);
      --text:#f0f0f2; --text-2:#b4b4ba; --muted:#6e6e76;
      --green:#30d158; --green-dim:rgba(48,209,88,.12);
      --red:#ff453a; --red-dim:rgba(255,69,58,.12);
      --yellow:#ffd60a; --accent:#0a84ff; --accent-dim:rgba(10,132,255,.12);
      --purple:#bf5af2; --purple-dim:rgba(191,90,242,.12);
      --D-bg:rgba(48,209,88,.10); --D-fg:#30d158;
      --T-bg:rgba(10,132,255,.10); --T-fg:#64b5f6;
      --acc-bg:rgba(255,255,255,.06); --acc-fg:#8e8e93;
      --com-bg:rgba(255,214,10,.10); --com-fg:#ffd60a;
      --sin-bg:rgba(48,209,88,.08); --sin-fg:#30d158;
      --pill-active-bg:rgba(10,132,255,.12); --pill-active-border:rgba(10,132,255,.4);
      --shadow:0 1px 2px rgba(0,0,0,.3);
      --shadow-md:0 4px 16px rgba(0,0,0,.4);
      --shadow-lg:0 12px 40px rgba(0,0,0,.55);
      --glow:0 0 0 3px rgba(10,132,255,.22);
      --card-hover:rgba(255,255,255,.025);
      --gradient-header:linear-gradient(180deg, #18181b 0%, #131315 100%);
    }
    [data-theme="light"] {
      --bg:#f2f2f7; --surface:#ffffff; --surface2:#f0f0f2; --surface3:#e8e8ec;
      --border:rgba(0,0,0,.06); --border-strong:rgba(0,0,0,.1);
      --text:#1c1c1e; --text-2:#48484a; --muted:#8e8e93;
      --green:#28a745; --green-dim:rgba(40,167,69,.08);
      --red:#ff3b30; --red-dim:rgba(255,59,48,.08);
      --yellow:#ff9500; --accent:#007aff; --accent-dim:rgba(0,122,255,.06);
      --purple:#af52de; --purple-dim:rgba(175,82,222,.08);
      --D-bg:rgba(40,167,69,.08); --D-fg:#1e8449;
      --T-bg:rgba(0,122,255,.06); --T-fg:#007aff;
      --acc-bg:rgba(0,0,0,.04); --acc-fg:#6c6c70;
      --com-bg:rgba(255,149,0,.08); --com-fg:#cc7a00;
      --sin-bg:rgba(40,167,69,.06); --sin-fg:#1e8449;
      --pill-active-bg:rgba(0,122,255,.06); --pill-active-border:rgba(0,122,255,.35);
      --shadow:0 1px 2px rgba(0,0,0,.06);
      --shadow-md:0 4px 16px rgba(0,0,0,.08);
      --shadow-lg:0 12px 40px rgba(0,0,0,.14);
      --glow:0 0 0 3px rgba(0,122,255,.18);
      --card-hover:rgba(0,0,0,.018);
      --gradient-header:linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{height:100%;overflow:hidden;position:fixed;width:100%;top:0;left:0}
    body{
      height:100%; height:100dvh;
      display:flex; flex-direction:column;
      background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
      font-size:15px; overflow:hidden;
      -webkit-tap-highlight-color:transparent;
      -webkit-font-smoothing:antialiased;
    }

    /* ── HEADER ── */
    header{
      flex-shrink:0;
      background:var(--gradient-header);
      border-bottom:1px solid var(--border);
      padding-top:env(safe-area-inset-top);
      position:relative;
      z-index:10;
    }
    .nav-row{display:flex;align-items:center;padding:8px 6px 4px;gap:0}
    .nav-btn{
      width:40px;height:40px;display:flex;align-items:center;justify-content:center;
      background:none;border:none;color:var(--accent);font-size:1.3rem;cursor:pointer;
      border-radius:10px;flex-shrink:0;transition:background .15s,transform .1s;
    }
    .nav-btn:active{background:var(--surface2);transform:scale(.9)}
    .nav-btn:disabled{color:var(--border-strong);transform:none}
    .date-center{
      flex:1;display:flex;flex-direction:column;align-items:center;
      cursor:pointer;padding:4px 8px;border-radius:10px;min-width:0;
      transition:background .15s;
    }
    .date-center:active{background:var(--surface2)}
    #date-label{font-size:1.1rem;font-weight:800;line-height:1.2;letter-spacing:-.02em}
    #date-sub{font-size:0.65rem;color:var(--muted);line-height:1.3;margin-top:1px;letter-spacing:.01em}
    .hdr-btns{display:flex;gap:1px}
    .icon-btn{
      width:36px;height:36px;display:flex;align-items:center;justify-content:center;
      background:none;border:none;font-size:0.88rem;cursor:pointer;
      border-radius:10px;color:var(--muted);transition:background .15s,transform .1s;
    }
    .icon-btn:active{background:var(--surface2);transform:scale(.9)}

    /* ── STATS CARD ── */
    .stats-card{
      margin:4px 12px 6px;
      padding:10px 14px;
      background:var(--surface2);
      border-radius:14px;
      border:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
    }
    .stats-left{display:flex;flex-direction:column;gap:1px}
    #day-total{font-size:1.3rem;font-weight:800;color:var(--green);letter-spacing:-.03em;line-height:1.2}
    #day-info{font-size:0.65rem;color:var(--muted);font-weight:500;letter-spacing:.01em}
    .stats-right{display:flex;gap:6px}
    .stat-pill{
      display:flex;flex-direction:column;align-items:center;
      padding:4px 10px;border-radius:10px;min-width:44px;
    }
    .stat-pill.pending{background:var(--accent-dim)}
    .stat-pill.confirmed{background:var(--green-dim)}
    .stat-num{font-size:1rem;font-weight:800;line-height:1.2}
    .stat-pill.pending .stat-num{color:var(--accent)}
    .stat-pill.confirmed .stat-num{color:var(--green)}
    .stat-lbl{font-size:0.5rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);line-height:1.3}

    .filter-row{
      display:flex;gap:6px;padding:4px 12px 10px;
      overflow-x:auto;scrollbar-width:none;
    }
    .filter-row::-webkit-scrollbar{display:none}
    .pill{
      padding:6px 14px;border-radius:100px;
      border:1.5px solid var(--border-strong);background:transparent;
      color:var(--muted);font-size:0.68rem;font-weight:600;
      white-space:nowrap;cursor:pointer;
      transition:all .2s cubic-bezier(.4,.0,.2,1);letter-spacing:.01em;
    }
    .pill:active{transform:scale(.93)}
    .pill.active{
      border-color:var(--pill-active-border);color:var(--accent);
      background:var(--pill-active-bg);
    }

    /* ── MAIN ── */
    main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}

    .legend-toggle{
      display:flex;align-items:center;gap:6px;
      padding:10px 16px;cursor:pointer;
      border-bottom:1px solid var(--border);
      transition:background .15s;
    }
    .legend-toggle:active{background:var(--card-hover)}
    .legend-toggle span{font-size:0.66rem;color:var(--muted);font-weight:500}
    .legend-body{
      display:grid;grid-template-columns:repeat(3,1fr);gap:6px 12px;
      padding:10px 16px 12px;
      border-bottom:1px solid var(--border);
      background:var(--surface);
    }
    .lg{font-size:0.66rem;color:var(--muted)}
    .lg b{color:var(--text);font-family:'SF Mono',ui-monospace,monospace;font-size:0.7rem}

    /* ── ENTRY (card style) ── */
    .entry{
      display:flex;align-items:center;min-height:56px;
      padding:10px 14px;gap:12px;
      margin:6px 12px 0;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:14px;
      transition:background .15s,box-shadow .15s;
      position:relative;
    }
    .entry:last-child{margin-bottom:6px}
    [data-theme="light"] .entry{box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .entry:active{background:var(--card-hover)}
    .entry.done{opacity:1}
    .entry.done .entry-body{opacity:.55}
    .chk{
      width:26px;height:26px;min-width:26px;border-radius:50%;
      border:2px solid var(--border-strong);background:transparent;
      color:transparent;font-size:0.65rem;font-weight:700;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:all .25s cubic-bezier(.34,1.56,.64,1);
      flex-shrink:0;
    }
    .chk:active{transform:scale(.8)}
    .chk.on{
      background:var(--green);border-color:var(--green);color:#fff;
      box-shadow:0 2px 10px rgba(48,209,88,.35);
      transform:scale(1);
    }
    .entry-body{
      flex:1;display:flex;align-items:center;
      flex-wrap:wrap;gap:6px;row-gap:4px;min-width:0;
      cursor:pointer;
    }
    .entry-body:active{opacity:.6}
    .bt{
      font-size:0.56rem;font-weight:800;padding:3px 8px;
      border-radius:6px;flex-shrink:0;letter-spacing:.04em;
      text-transform:uppercase;
    }
    .D{background:var(--D-bg);color:var(--D-fg)}
    .T{background:var(--T-bg);color:var(--T-fg)}
    .ea{font-size:0.95rem;font-weight:800;flex-shrink:0;letter-spacing:-.02em}
    .entry.done .ea{color:var(--muted)}
    .ba{
      font-size:0.56rem;font-weight:600;padding:3px 8px;
      border-radius:6px;background:var(--acc-bg);color:var(--acc-fg);
      flex-shrink:0;letter-spacing:.01em;
    }
    .en{font-size:0.76rem;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;font-weight:500}
    .entry.done .en{color:var(--muted)}
    .btn-del{
      background:none;border:none;color:var(--border-strong);font-size:0.7rem;
      width:28px;height:28px;display:flex;align-items:center;justify-content:center;
      cursor:pointer;flex-shrink:0;border-radius:8px;
      transition:all .15s;opacity:.5;
    }
    .btn-del:active{color:var(--red);background:var(--red-dim);opacity:1}
    .empty{
      text-align:center;padding:80px 32px 60px;color:var(--muted);
      font-size:0.82rem;font-weight:500;line-height:1.6;
    }
    .empty::before{
      content:'';display:block;width:48px;height:48px;margin:0 auto 16px;
      border-radius:14px;background:var(--surface2);
      border:1.5px dashed var(--border-strong);
    }
    .bsc{
      font-size:0.52rem;font-weight:700;padding:3px 6px;
      border-radius:6px;background:var(--sin-bg);color:var(--sin-fg);
      flex-shrink:0;letter-spacing:.04em;text-transform:uppercase;
    }

    /* ── NAME PICKER ── */
    .name-grid{display:flex;flex-wrap:wrap;gap:8px;padding:0 20px 16px}
    .name-chip{
      padding:10px 18px;border-radius:12px;
      border:1.5px solid var(--border-strong);background:var(--surface2);
      color:var(--text);font-size:0.8rem;font-weight:500;
      cursor:pointer;white-space:nowrap;
      transition:all .2s cubic-bezier(.34,1.56,.64,1);
    }
    .name-chip:active{
      background:var(--accent);color:#fff;border-color:var(--accent);
      transform:scale(.93);box-shadow:0 4px 16px rgba(10,132,255,.35);
    }
    .name-chip.add{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
    .name-chip.skip{border-color:var(--border-strong);color:var(--muted);border-style:dashed;background:transparent}

    /* (input bar removed — replaced by FAB + guided add flow) */

    /* ── SHEETS ── */
    .sheet-overlay{
      display:none;position:fixed;inset:0;z-index:300;
      background:rgba(0,0,0,.5);align-items:flex-end;
      -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    }
    .sheet-overlay.open{display:flex}
    .sheet{
      background:var(--surface);border-radius:20px 20px 0 0;
      border-top:1px solid var(--border);
      padding-bottom:calc(20px + env(safe-area-inset-bottom));
      width:100%;animation:sup .3s cubic-bezier(.32,.72,.24,1);
      box-shadow:var(--shadow-lg);
      max-height:85vh;overflow-y:auto;
    }
    @keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .s-handle{width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:10px auto 14px}
    .s-title{font-size:1.05rem;font-weight:800;padding:0 20px 12px;letter-spacing:-.02em}
    .s-desc{font-size:0.76rem;color:var(--muted);padding:0 20px 12px;font-weight:500}
    .s-input{
      display:block;width:calc(100% - 40px);margin:0 20px 14px;
      background:var(--surface2);border:1.5px solid var(--border-strong);
      border-radius:12px;color:var(--text);font-size:0.9rem;
      padding:12px 14px;outline:none;-webkit-appearance:none;
      transition:border-color .2s, box-shadow .2s;
    }
    .s-input:focus{border-color:var(--accent);box-shadow:var(--glow)}
    .s-btns{display:flex;gap:10px;padding:0 20px}
    .sbc{
      flex:1;padding:14px;border-radius:12px;border:1.5px solid var(--border-strong);
      background:transparent;color:var(--text-2);font-size:0.85rem;font-weight:600;
      cursor:pointer;transition:all .15s;
    }
    .sbc:active{background:var(--surface2);transform:scale(.97)}
    .sbp{
      flex:2;padding:14px;border-radius:12px;border:none;
      background:var(--green);color:#fff;font-size:0.85rem;font-weight:700;
      cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);
      box-shadow:0 3px 12px rgba(48,209,88,.3);
    }
    .sbp:active{transform:scale(.96);filter:brightness(.9)}

    /* history */
    .hist-scroll{max-height:62vh;overflow-y:auto}
    .hist-row{
      display:flex;justify-content:space-between;align-items:center;
      padding:14px 20px;border-bottom:1px solid var(--border);cursor:pointer;
      transition:background .15s;
    }
    .hist-row:active{background:var(--surface2)}
    .hr-date{font-size:0.88rem;font-weight:700}
    .hr-sub{font-size:0.66rem;color:var(--muted);margin-top:2px}
    .hr-total{font-size:0.88rem;font-weight:800;color:var(--green);text-align:right}
    .hr-info{font-size:0.62rem;color:var(--muted);text-align:right;margin-top:2px}

    /* rank badge */
    .brank{
      font-size:0.46rem;font-weight:800;
      width:16px;height:16px;min-width:16px;
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      background:var(--accent);color:#fff;flex-shrink:0;
      box-shadow:0 1px 4px rgba(10,132,255,.3);
    }

    /* settings */
    .set-row{
      display:flex;justify-content:space-between;align-items:center;
      padding:14px 20px;border-bottom:1px solid var(--border);cursor:pointer;
      transition:background .15s;
    }
    .set-row:active{background:var(--surface2)}
    .set-row-lbl{font-size:0.88rem;font-weight:500}
    .set-row-val{font-size:0.82rem;color:var(--muted);font-weight:500}
    .set-section{padding:14px 20px 4px}
    .set-label{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:block;margin-bottom:8px}
    .set-inp{
      display:block;width:100%;margin-bottom:8px;
      background:var(--surface2);border:1.5px solid var(--border-strong);
      border-radius:12px;color:var(--text);font-size:0.8rem;
      padding:11px 13px;outline:none;font-family:'SF Mono',ui-monospace,monospace;-webkit-appearance:none;
      transition:border-color .2s, box-shadow .2s;
    }
    .set-inp:focus{border-color:var(--accent);box-shadow:var(--glow)}
    .set-btn{
      display:block;width:calc(100% - 40px);margin:0 20px 10px;
      padding:14px;border-radius:12px;border:1.5px solid var(--accent);
      background:transparent;color:var(--accent);
      font-size:0.85rem;font-weight:600;cursor:pointer;
      transition:all .2s cubic-bezier(.34,1.56,.64,1);
    }
    .set-btn:active{background:var(--accent-dim);transform:scale(.97)}
    .set-btn.danger{border-color:var(--red);color:var(--red)}
    .set-btn.danger:active{background:var(--red-dim)}
    #sync-dot{width:8px;height:8px;border-radius:50%;background:var(--border-strong);display:inline-block;margin-left:6px;vertical-align:middle;transition:background .3s}
    #sync-dot.syncing{background:var(--yellow);animation:pulse 1s infinite}
    #sync-dot.synced{background:var(--green)}
    #sync-dot.error{background:var(--red)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    #btn-sync.sync-syncing{color:var(--yellow);animation:spin 1s linear infinite}
    #btn-sync.sync-synced{color:var(--green)}
    #btn-sync.sync-error{color:var(--red)}
    @keyframes spin{to{transform:rotate(360deg)}}

    #date-picker{position:fixed;opacity:0;pointer-events:none;width:0;height:0}

    /* ── CALENDAR ── */
    .cal-hdr{display:flex;justify-content:space-between;align-items:center;padding:0 10px 12px}
    .cal-title{font-size:1.05rem;font-weight:800;letter-spacing:-.02em}
    .cal-nav{background:none;border:none;color:var(--accent);font-size:1.4rem;cursor:pointer;padding:4px 12px;line-height:1;border-radius:10px;transition:background .15s}
    .cal-nav:active{background:var(--surface2)}
    .cal-nav:disabled{color:var(--border-strong)}
    .cal-wdays{display:grid;grid-template-columns:repeat(7,1fr);padding:0 10px;margin-bottom:4px}
    .cal-wd{text-align:center;font-size:0.58rem;font-weight:700;color:var(--muted);padding:4px 0;text-transform:uppercase;letter-spacing:.06em}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px 16px;gap:3px}
    .cal-cell{
      height:42px;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      font-size:0.82rem;cursor:pointer;
      border-radius:12px;position:relative;font-weight:500;
      transition:all .15s;
    }
    .cal-cell.empty{cursor:default;pointer-events:none}
    .cal-cell.future{color:var(--border-strong);cursor:default;pointer-events:none}
    .cal-cell.has-data::after{
      content:'';width:5px;height:5px;border-radius:50%;
      background:var(--green);position:absolute;bottom:3px;
    }
    .cal-cell.is-today{
      background:var(--accent);color:#fff;font-weight:700;
      box-shadow:0 2px 10px rgba(10,132,255,.3);
    }
    .cal-cell.is-today.has-data::after{background:rgba(255,255,255,.7)}
    .cal-cell.is-sel:not(.is-today){background:var(--surface2);font-weight:700}
    .cal-cell:not(.empty):not(.future):active{background:var(--card-hover);transform:scale(.9)}

    /* ── ENTRY ANIMATION ── */
    @keyframes fadeSlideIn{
      from{opacity:0;transform:translateY(-6px) scale(.98)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }
    .entry{animation:fadeSlideIn .2s cubic-bezier(.34,1.56,.64,1)}

    /* ── PERFORMANCE ── */
    main{contain:content}
    .entry{contain:layout style;will-change:auto}
    .sheet-overlay{will-change:auto}
    .sheet-overlay.open .sheet{will-change:transform}

    /* ── SWIPE DELETE ── */
    .entry{overflow:hidden;position:relative}
    .entry-swipe-bg{
      position:absolute;right:0;top:0;bottom:0;width:80px;
      background:var(--red);display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:0.75rem;font-weight:700;letter-spacing:.02em;
      opacity:0;transition:opacity .15s;pointer-events:none;
      border-radius:0 14px 14px 0;
    }
    .entry.swiping .entry-swipe-bg{opacity:1}
    .entry-inner{
      display:flex;align-items:center;min-height:56px;
      gap:12px;width:100%;background:inherit;
      position:relative;z-index:1;
      transition:transform .2s cubic-bezier(.4,.0,.2,1);
    }
    .entry.swiping .entry-inner{transition:none}

    /* ── MANAGE LISTS (banks/names in settings) ── */
    .mgr-list{padding:0 20px 8px;display:flex;flex-wrap:wrap;gap:6px}
    .mgr-chip{
      display:inline-flex;align-items:center;gap:4px;
      padding:6px 8px 6px 12px;border-radius:10px;
      background:var(--surface2);color:var(--text);
      font-size:0.72rem;font-weight:500;border:1px solid var(--border);
      transition:all .15s;
    }
    .mgr-chip .mgr-x{
      width:18px;height:18px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      background:transparent;border:none;color:var(--muted);
      font-size:0.65rem;cursor:pointer;transition:all .15s;flex-shrink:0;
    }
    .mgr-chip .mgr-x:active{background:var(--red);color:#fff}
    .mgr-add-row{display:flex;gap:6px;padding:0 20px 14px;align-items:center}
    .mgr-add-row input{
      flex:1;background:var(--surface2);border:1.5px solid var(--border-strong);

    /* ── ADD FLOW (guided wizard) ── */
    .fab{
      position:fixed;right:16px;bottom:calc(16px + env(safe-area-inset-bottom));

    .toast{

      transition:all .3s ease;pointer-events:none;

    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .add-type-row{display:flex;gap:10px;margin-bottom:12px}
    .add-type-btn{
      flex:1;padding:14px;border-radius:12px;

      transition:all .2s cubic-bezier(.34,1.56,.64,1);

    .add-type-btn .add-type-letter{font-size:1.4rem;font-weight:800}
    .add-type-btn .add-type-label{font-size:0.62rem;font-weight:500;color:var(--muted)}

    .add-type-btn.sel-t{background:var(--T-bg);border-color:var(--T-fg);color:var(--T-fg)}

    .add-sc-row{display:flex;align-items:center;gap:10px}
    .add-sc-toggle{

    .add-amount-wrap{display:flex;align-items:center;gap:10px;margin-top:12px}

    /* ── HAPTIC FEEDBACK ── */

<script>
// ── Dynamic banks & names (localStorage-backed) ────────────────────────────
const DEFAULT_BANKS = [
  {name:'Banc. Nómina', label:'Nómina', shortcuts:['n','nom','nomina']},
  {name:'Banc. Digital', label:'Digital', shortcuts:['d','dig','digital']},
  {name:'Invex', label:'Invex', shortcuts:['inv','invex']},
  {name:'Mifel', label:'Mifel', shortcuts:['mf','mifel']},
  {name:'BBVA', label:'BBVA', shortcuts:['b','bb','bbva']},
  {name:'Banregio', label:'Banregio', shortcuts:['r','br','banr','banregio']},
];
const DEFAULT_NAMES = ['marlon mexico','moises','raulito','cuenca','jcarlos','pesmex','idasbel','frankcabrera','kendry','nesty','betty','robin','gerardo','ismael','alguiennew'];

function loadBanks() {
  try { const v=JSON.parse(localStorage.getItem('cobros_banks')); if(Array.isArray(v)&&v.length) return v; } catch(e){}
  return DEFAULT_BANKS.map(b=>({...b}));
}
function normName(n){ return (typeof n==='string') ? {name:n, updatedAt:0} : n; }
function loadNames() {
  try { const v=JSON.parse(localStorage.getItem('cobros_names')); if(Array.isArray(v)) return v.map(normName).filter(x=>x&&x.name); } catch(e){}
  return DEFAULT_NAMES.map(n=>({name:n, updatedAt:0}));
}
let banks = loadBanks();
let names = loadNames();
function saveBanks(){ localStorage.setItem('cobros_banks',JSON.stringify(banks)); }
function saveNames(){ localStorage.setItem('cobros_names',JSON.stringify(names)); }
function liveNames(){ return names.filter(n=>!n.deleted); }
function liveBanks(){ return banks.filter(b=>!b.deleted); }

// Reconstruye bancos faltantes a partir de los cobros reales (campo account).
// Garantiza que ningún banco usado se pierda, aunque su definición nunca se
// haya sincronizado a este dispositivo. No resucita bancos borrados a propósito
// (se saltan los que ya existen como tombstone).
function reconcileBanksFromRecords(){
  const known = new Set(banks.map(b=>b.name)); // incluye borrados: no resucitar
  let added = false;
  for (const r of records){
    if (!r || r.deleted || !r.account || known.has(r.account)) continue;
    known.add(r.account);
    const short = (r.account.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,3)) || r.account.toLowerCase().slice(0,3) || 'bco';
    banks.push({name:r.account, label:r.account, shortcuts:[short], updatedAt:0, derived:true});
    added = true;
  }
  if (added){ saveBanks(); }
  return added;
}

function buildACC() {
  const acc = {};
  for(const b of banks){ if(b.deleted) continue; for(const s of b.shortcuts) acc[s]=b.name; }
  return acc;
}
let ACC = buildACC();
let ACC_KEYS = Object.keys(ACC).sort((a,b)=>b.length-a.length);

let records = [];
let viewDate = todayISO();
let activeFilter = 'all';
let theme = localStorage.getItem('theme') || 'dark';
let pendingId = null;
let syncTimer = null;

// ── Cached DOM refs (avoid repeated getElementById) ──────────────────────────
const $ = id => document.getElementById(id);
const DOM = {};
// Cache immediately — script runs at end of body, all elements exist
['date-label','date-sub','day-total','day-info','stat-pend','stat-conf',
 'btn-next','list',
 'name-desc','name-custom','name-grid','name-inp',
 'edit-amount','edit-name','leg-body','leg-arr','btn-theme','theme-val',
 'sync-dot','gh-tok','gh-gid','cal-title','cal-next','cal-grid',
 'hist-list'].forEach(id => { DOM[id] = $(id); });

// ── Haptic feedback ─────────────────────────────────────────────────────────
function haptic(ms=10){ if(navigator.vibrate) navigator.vibrate(ms); }
let _toastTimer;
function showToast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Storage ──────────────────────────────────────────────────────────────────
let saveQueued = false;
function save() {
  if (!saveQueued) {
    saveQueued = true;
    queueMicrotask(() => {
      localStorage.setItem('cobros_v2', JSON.stringify(records));
      saveQueued = false;
    });
  }
  scheduleSync();
}
function load() {
  try { records = JSON.parse(localStorage.getItem('cobros_v2')) || []; } catch(e) { records=[]; }
  if (!records.length) {
    try {
      const old = JSON.parse(localStorage.getItem('cobros_v1')) || [];
      if (old.length) { records = old.map(r=>({...r, tipo:r.tipo||'D'})); save(); }
    } catch(e) {}
  }
}

// ── Utils ────────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
// Cached formatter — avoid creating Intl object on every call
const _fmt = new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN'});
function fmt(n) { return _fmt.format(n); }
function cap(s) { return s ? s.charAt(0).toUpperCase()+s.slice(1) : ''; }
function todayISO() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function shiftDate(iso, d) {
  const dt = new Date(iso+'T12:00:00');
  dt.setDate(dt.getDate()+d);
  return dt.toISOString().slice(0,10);
}
const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DAYS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
function displayDate(iso) {
  const today = todayISO();
  const dt = new Date(iso+'T12:00:00');
  const str = `${dt.getDate()} de ${MONTHS[dt.getMonth()]}`;
  const diff = Math.round((new Date(today+'T12:00:00') - dt) / 86400000);
  if (diff===0) return {label:'Hoy', sub:str};
  if (diff===1) return {label:'Ayer', sub:str};
  if (diff<=6)  return {label:DAYS[dt.getDay()], sub:str};
  return {label:str, sub:String(dt.getFullYear())};
}

// ── Render ───────────────────────────────────────────────────────────────────
// Build a date→records index for O(1) day lookups instead of filtering all records
let _dateIndex = null;
let _dateIndexVer = 0;
let _recordsVer = 0;
function invalidateIndex() { _recordsVer++; }
function getDateIndex() {
  if (_dateIndex && _dateIndexVer === _recordsVer) return _dateIndex;
  _dateIndex = {};
  for (const r of records) {
    if (r.deleted) continue;
    const d = r.date || '?';
    if (!_dateIndex[d]) _dateIndex[d] = [];
    _dateIndex[d].push(r);
  }
  _dateIndexVer = _recordsVer;
  return _dateIndex;
}
function getDayRecs() { return getDateIndex()[viewDate] || []; }
function getFiltered() {
  const base = getDayRecs();
  if (activeFilter==='all') return base;
  return base.filter(r => r.account === activeFilter);
}

function renderHeader() {
  const {label,sub} = displayDate(viewDate);
  DOM['date-label'].textContent = label;
  DOM['date-sub'].textContent   = sub;
  const recs = getDayRecs();
  let total=0, conf=0, pend=0;
  for (const r of recs) {
    total += r.amount;
    if (r.confirmed) conf++; else pend++;
  }
  DOM['day-total'].textContent = fmt(total);
  DOM['day-info'].textContent  = recs.length===0 ? 'Sin entradas' : `${recs.length} cobro${recs.length!==1?'s':''}`;
  DOM['stat-pend'].textContent = pend;
  DOM['stat-conf'].textContent = conf;
  DOM['btn-next'].disabled = viewDate >= todayISO();
}

// Cache bank ranks — only recalculate when records change
let _rankCache = null;
let _rankVer = -1;
function getBankRanks() {
  if (_rankCache && _rankVer === _recordsVer) return _rankCache;
  const byBank = {};
  for (const r of records) {
    if (r.deleted || !r.account) continue;
    if (!byBank[r.account]) byBank[r.account] = [];
    byBank[r.account].push(r);
  }
  _rankCache = {};
  for (const bank of Object.keys(byBank)) {
    byBank[bank].sort((a,b)=>b.createdAt-a.createdAt);
    const top = byBank[bank];
    const len = Math.min(3, top.length);
    for (let i=0;i<len;i++) _rankCache[top[i].id] = i+1;
  }
  _rankVer = _recordsVer;
  return _rankCache;
}

// Use DocumentFragment for batch DOM insertion
function renderList() {
  const el = DOM['list'];
  const data = getFiltered().sort((a,b)=>b.createdAt-a.createdAt);
  if (!data.length) {
    el.innerHTML=`<div class="empty">${activeFilter==='all'?'Toca + para añadir un cobro.':'Sin cobros con este filtro.'}</div>`;
    return;
  }
  const ranks = getBankRanks();
  const frag = document.createDocumentFragment();
  for (const r of data) {
    const div = document.createElement('div');
    div.className = 'entry' + (r.confirmed ? ' done' : '');
    div.id = 'e-' + r.id;
    div.dataset.id = r.id;

    const name = r.name?`<span class="en">${cap(r.name)}</span>`:'';
    const sc   = (!r.com && r.tipo==='D')?`<span class="bsc">sc</span>`:'';
    const rk   = ranks[r.id] ? `<span class="brank">${ranks[r.id]}</span>` : '';
    div.innerHTML = `<button class="chk ${r.confirmed?'on':''}" data-action="confirm">✓</button>
      <div class="entry-body" data-action="edit">
        <span class="bt ${r.tipo}">${r.tipo}</span>
        <span class="ea">${fmt(r.amount)}</span>
        ${r.account?`<span class="ba">${r.account}</span>`:''}
        ${sc}${rk}
        ${name}
      </div>
      <button class="btn-del" data-action="del">✕</button>`;
    frag.appendChild(div);
  }
  el.textContent = ''; // Clear faster than innerHTML=''
  el.appendChild(frag);
}

// Debounced render via rAF to avoid double-renders in same frame
let _renderRAF = 0;
function render() {
  if (_renderRAF) return;
  _renderRAF = requestAnimationFrame(() => {
    _renderRAF = 0;
    renderHeader();
    renderList();
  });
}
// Immediate render for init
function renderNow() { renderHeader(); renderList(); }

// ── Event Delegation (replaces inline onclick) ───────────────────────────────
DOM['list'].addEventListener('click', e => {
  const entry = e.target.closest('.entry');
  if (!entry) return;
  const id = entry.dataset.id;
  const action = e.target.closest('[data-action]');
  if (!action) return;
  const act = action.dataset.action;
  haptic();
  if (act === 'confirm') tapConfirm(id);

// ── Swipe-to-delete (touch) ──────────────────────────────────────────────────
let swipeEntry=null, swipeStartX=0, swipeStartY=0, swiping=false, swipeDx=0;
document.getElementById('list').addEventListener('touchstart', e => {
  const entry = e.target.closest('.entry');
  if (!entry) return;
  swipeEntry = entry;
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
  swiping = false; swipeDx = 0;
}, {passive:true});
document.addEventListener('touchmove', e => {
  if (!swipeEntry) return;
  const dx = e.touches[0].clientX - swipeStartX;
  const dy = e.touches[0].clientY - swipeStartY;
  if (!swiping && Math.abs(dy) > Math.abs(dx)) { swipeEntry=null; return; }
  if (dx < -10) swiping = true;
  if (!swiping) return;
  swipeDx = Math.min(0, dx);
  const inner = swipeEntry.querySelector('.entry-inner') || swipeEntry;
  inner.style.transform = `translateX(${swipeDx}px)`;
  if (swipeDx < -30) swipeEntry.classList.add('swiping');
}, {passive:true});
document.addEventListener('touchend', () => {
  if (!swipeEntry) return;
  if (swiping && swipeDx < -80) {
    const id = swipeEntry.dataset.id;
    if (id) {
      haptic(20);
      swipeEntry.style.transition = 'all .2s';
      swipeEntry.style.transform = 'translateX(-100%)';
      swipeEntry.style.opacity = '0';
      swipeEntry.style.maxHeight = '0';
      setTimeout(() => {
        const r=records.find(r=>r.id===id);
        if (r) { r.deleted=true; r.updatedAt=Date.now(); }
        invalidateIndex();
        save(); render();
      }, 200);
    }
  } else if (swiping) {
    const inner = swipeEntry.querySelector('.entry-inner') || swipeEntry;
    inner.style.transform = '';
    swipeEntry.classList.remove('swiping');
  }
  swipeEntry=null; swiping=false; swipeDx=0;
}, {passive:true});

function renderCal() {
  const y = calMonth.getFullYear();
  const m = calMonth.getMonth();
  DOM['cal-title'].textContent = `${CAL_MONTHS[m]} ${y}`;
  const now = new Date();

  const today = todayISO();

  const firstDay = (new Date(y,m,1).getDay()+6)%7;
  const total = new Date(y,m+1,0).getDate();

  const parts = [];
  for(let i=0;i<firstDay;i++) parts.push(`<div class="cal-cell empty"></div>`);
  for(let d=1;d<=total;d++){
    const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls=['cal-cell',
      iso>today?'future':'',
      iso===today?'is-today':'',
      iso===viewDate&&iso!==today?'is-sel':'',
      hasDates.has(iso)?'has-data':'',
    ].filter(Boolean).join(' ');
    const attr = iso<=today ? `data-iso="${iso}"` : '';
    parts.push(`<div class="${cls}" ${attr}>${d}</div>`);
  }
  DOM['cal-grid'].innerHTML = parts.join('');

// ── Sincronización (GitHub Gist · fusión sin pérdida + sondeo) ────────────────
// Modelo: cada dispositivo FUSIONA (nunca reemplaza). Registros/bancos/nombres
// se unen por clave; gana la versión con updatedAt más reciente. Los borrados
// son "tombstones" (deleted:true) para que se propaguen sin resucitar datos.
const GFILE='cobros-data.json';
const GDESC='cobros-app-data';
const POLL_MS=5000;
function setSyncDot(s){
  DOM['sync-dot'].className=s;
  const b=$('btn-sync');
  if(b) b.className='icon-btn'+(s?(' sync-'+s):'');
}
function ghTs(o){ return (o&&(o.updatedAt||o.createdAt))||0; }
function mergeByKey(local, remote, key){
  const map=new Map();
  for(const x of local) if(x&&x[key]!=null) map.set(x[key],x);
  for(const x of remote){
    if(!x||x[key]==null) continue;
    const ex=map.get(x[key]);
    if(!ex || ghTs(x)>=ghTs(ex)) map.set(x[key],x);
  }
  return [...map.values()];
}
// ¿tenemos algo local más nuevo/exclusivo que el remoto no tiene?
function hasLocalNewer(local, remote, key){
  const rmap=new Map(remote.map(x=>[x[key],x]));
  for(const x of local){
    const r=rmap.get(x[key]);
    if(!r || ghTs(x)>ghTs(r)) return true;
  }
  return false;
}
function buildSyncDoc(){ return JSON.stringify({v:3, records, banks, names}); }
function parseSyncDoc(content){
  let data; try{ data=JSON.parse(content); }catch(e){ return null; }
  if(Array.isArray(data)) return {records:data, banks:null, names:null}; // formato antiguo
  if(data&&typeof data==='object') return {
    records:Array.isArray(data.records)?data.records:[],
    banks:Array.isArray(data.banks)?data.banks:null,
    names:Array.isArray(data.names)?data.names.map(normName):null,
  };
  return null;
}
function persistAll(){
  localStorage.setItem('cobros_v2',JSON.stringify(records));
  saveBanks(); saveNames();
}
function rebuildBankDerived(){ ACC=buildACC(); ACC_KEYS=Object.keys(ACC).sort((a,b)=>b.length-a.length); }
function renderAll(){ renderPills(); renderLegend(); invalidateIndex(); render(); }

async function ensureGid(tok){
  let gid=localStorage.getItem('gh_gid');
  if(gid) return gid;
  const h={'Authorization':`token ${tok}`};
  const list=await(await fetch('https://api.github.com/gists',{headers:h})).json();
  const found=Array.isArray(list)?list.find(g=>g.description===GDESC):null;
  if(found){ gid=found.id; }
  else{
    const r=await(await fetch('https://api.github.com/gists',{method:'POST',
      headers:{...h,'Content-Type':'application/json'},
      body:JSON.stringify({description:GDESC,public:false,files:{[GFILE]:{content:buildSyncDoc()}}})})).json();
    gid=r.id;
  }
  if(gid){ localStorage.setItem('gh_gid',gid); if(DOM['gh-gid']) DOM['gh-gid'].value=gid; }
  return gid;
}

let _syncing=false, _syncAgain=false;
async function syncNow(){
  const tok=localStorage.getItem('gh_tok');
  if(!tok) return;
  if(_syncing){ _syncAgain=true; return; }
  _syncing=true; setSyncDot('syncing');
  try{
    const gid=await ensureGid(tok);
    if(!gid){ setSyncDot('error'); return; }
    const h={'Authorization':`token ${tok}`};
    const j=await(await fetch(`https://api.github.com/gists/${gid}`,{headers:h,cache:'no-store'})).json();
    const content=j&&j.files&&j.files[GFILE]?j.files[GFILE].content:null;
    const remote=content?parseSyncDoc(content):{records:[],banks:null,names:null};
    if(!remote){ setSyncDot('error'); return; }
    const rRecs=remote.records||[], rBanks=remote.banks||[], rNames=remote.names||[];
    // ¿debemos subir? (tenemos datos que el remoto aún no refleja)
    const needPush =
      hasLocalNewer(records,rRecs,'id') ||
      (remote.banks!=null ? hasLocalNewer(banks,rBanks,'name') : banks.length>0) ||
      (remote.names!=null ? hasLocalNewer(names,rNames,'name') : names.length>0);
    // fusionar remoto -> local (nunca perdemos lo nuestro)
    const before=JSON.stringify([records,banks,names]);
    records=mergeByKey(records,rRecs,'id');
    if(remote.banks!=null) banks=mergeByKey(banks,rBanks,'name');
    if(remote.names!=null) names=mergeByKey(names,rNames,'name');
    const recon=reconcileBanksFromRecords(); // recupera bancos desde los cobros
    const changedLocal=JSON.stringify([records,banks,names])!==before;
    if(changedLocal){ persistAll(); rebuildBankDerived(); renderAll(); }
    if(needPush||recon){
      await fetch(`https://api.github.com/gists/${gid}`,{method:'PATCH',
        headers:{...h,'Content-Type':'application/json'},
        body:JSON.stringify({files:{[GFILE]:{content:buildSyncDoc()}}})});
    }
    setSyncDot('synced');
  }catch(e){ setSyncDot('error'); }
  finally{ _syncing=false; if(_syncAgain){ _syncAgain=false; syncNow(); } }
}

function scheduleSync(){
  clearTimeout(syncTimer);
  if(!localStorage.getItem('gh_tok')) return;
  syncTimer=setTimeout(syncNow,1500);
}

let _pollTimer=null;
function startSync(){
  if(!localStorage.getItem('gh_tok')) return;
  syncNow();
  if(_pollTimer) clearInterval(_pollTimer);
  _pollTimer=setInterval(()=>{ if(!document.hidden) syncNow(); }, POLL_MS);
}

}

function addBank() {
  const nameInp = $('add-bank-name');
  const shortInp = $('add-bank-short');
  const bName = nameInp.value.trim();
  const bShort = shortInp.value.trim().toLowerCase();
  if (!bName) return;
  const short = bShort || bName.toLowerCase().slice(0,3);
  const ex = banks.find(b=>b.name===bName);
  if (ex) { ex.deleted=false; ex.label=bName; if(!ex.shortcuts.includes(short)) ex.shortcuts=[short]; ex.updatedAt=Date.now(); }
  else banks.push({name:bName, label:bName, shortcuts:[short], updatedAt:Date.now()});
  saveBanks(); scheduleSync(); ACC = buildACC(); ACC_KEYS = Object.keys(ACC).sort((a,b)=>b.length-a.length);
  nameInp.value=''; shortInp.value='';
  renderMgrBanks(); renderPills(); renderLegend();
}
function addName() {
  const inp = $('add-name-inp');
  const n = inp.value.trim().toLowerCase();
  if (!n) return;
  const ex = names.find(x=>x.name===n);
  if (ex) { ex.deleted=false; ex.updatedAt=Date.now(); }
  else names.push({name:n, updatedAt:Date.now()});
  saveNames(); scheduleSync(); renderMgrNames();
  inp.value='';
}
$('btn-add-bank').addEventListener('click', addBank);
$('add-bank-short').addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();addBank();} });
$('add-bank-name').addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();$('add-bank-short').focus();} });
$('btn-add-name').addEventListener('click', addName);
$('add-name-inp').addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();addName();} });

// ── Init ──────────────────────────────────────────────────────────────────────
load();
reconcileBanksFromRecords();
rebuildBankDerived();
applyTheme(theme);
renderPills();
renderLegend();
renderNow(); // Synchronous first paint
startSync();

// ── Keyboard fix (iOS Safari + Chrome/Brave) ───────────────────────────────────
if (window.visualViewport) {
  let _vpRAF = 0;
  function onViewport() {
    if (_vpRAF) return;
    _vpRAF = requestAnimationFrame(() => {
      _vpRAF = 0;
      const vv = window.visualViewport;
      document.body.style.height = vv.height + 'px';
      document.body.style.transform = vv.offsetTop ? `translateY(${vv.offsetTop}px)` : '';
    });
  }
  window.visualViewport.addEventListener('resize', onViewport, {passive:true});
  window.visualViewport.addEventListener('scroll', onViewport, {passive:true});
}

// ── Service Worker registration (offline support) ────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
